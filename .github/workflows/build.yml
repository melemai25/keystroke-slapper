name: Build on macOS

on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      
      - name: Download dependencies
        run: go mod download
      
      - name: Build
        run: go build -o spank .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spank-binary
          path: spank