name: Build on macOS

on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: 1.21
      
      - name: Download dependencies
        run: go mod download
      
      - name: Build
        run: go build -o spank .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: spank-binary
          path: spank